name: Convert and Deploy PDF to Word

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdf2docx flask

      - name: Run conversion script
        run: |
          python convert_script.py  # Replace with your actual script name

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'output'  # Folder containing converted files

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2

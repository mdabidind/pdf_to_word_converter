name: PDF to Word Conversion

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'PDF filename'
        required: true
      file_content:
        description: 'Base64 encoded file content'
        required: true
      format:
        description: 'Output format'
        required: true
        default: 'docx'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up environment
        run: |
          mkdir -p uploads
          mkdir -p converted
          echo "${{ inputs.file_content }}" | base64 --decode > uploads/${{ inputs.filename }}
          
      - name: Install LibreOffice
        run: sudo apt-get update && sudo apt-get install -y libreoffice
      
      - name: Convert file
        run: |
          libreoffice --headless --convert-to ${{ inputs.format }} \
            --outdir converted/ \
            uploads/${{ inputs.filename }}
          
      - name: Prepare output
        run: |
          OUTPUT_FILE=$(ls converted/)
          mv "converted/$OUTPUT_FILE" "converted/output.${{ inputs.format }}"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: converted-file
          path: converted/output.${{ inputs.format }}
          retention-days: 1

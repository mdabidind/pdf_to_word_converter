<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFToolsLover - PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDFToolsLover</h1>
            <h2>PDF to Word Converter</h2>
        </div>

        <div class="converter-box">
            <div class="file-input-container">
                <label class="file-input-label" id="fileInputLabel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <div>Click to choose PDF or drag & drop</div>
                    <div class="file-size">Max 10MB</div>
                </label>
                <input type="file" id="pdfFile" accept=".pdf">
                <div id="fileNameDisplay" class="file-name"></div>
            </div>

            <button id="convertBtn" disabled>Convert to Word</button>
            <div id="status"></div>
            <div id="downloadLink" style="display:none;">
                <a id="docxDownload" download class="download-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Download Word File</span>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>All conversions happen in your browser - your files never leave your device</p>
        </div>
    </div>

    <!-- Load libraries -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        // Initialize PDF.js
        pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // Verify libraries are loaded
        function checkLibraries() {
            if (typeof docx !== 'undefined' && typeof pdfjsLib !== 'undefined') {
                // Load main script
                const script = document.createElement('script');
                script.src = 'assets/script.js';
                document.head.appendChild(script);
            } else {
                setTimeout(checkLibraries, 100);
            }
        }
        checkLibraries();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFToolsLover - PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDFToolsLover</h1>
            <h2>PDF to Word Converter</h2>
        </div>

        <div class="converter-box">
            <input type="file" id="pdfFile" accept=".pdf">
            <button id="convertBtn" disabled>Convert to Word</button>
            <div id="status"></div>
            <div id="downloadLink" style="display:none;">
                <a id="docxDownload" download>Download Word File</a>
            </div>
        </div>

        <div class="footer">
            <p>All conversions happen in your browser - your files never leave your device</p>
        </div>
    </div>

    <!-- Load docx.js first from reliable CDN -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    
    <!-- Then load PDF.js with worker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        // Initialize PDF.js
        pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // Verify libraries are loaded
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof docx === 'undefined') {
                document.getElementById('status').textContent = 
                    'Error: Word conversion library failed to load. Please refresh the page.';
            }
            if (typeof pdfjsLib === 'undefined') {
                document.getElementById('status').textContent = 
                    'Error: PDF library failed to load. Please refresh the page.';
            }
        });
    </script>
    
    <!-- Main script -->
    <script src="assets/script.js"></script>
</body>
</html>

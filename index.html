<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <h1>PDF to Word</h1>
            <p class="subtitle">Convert your PDF documents to editable Word files</p>
            
            <div id="upload-section">
                <div id="drop-zone">
                    <svg class="upload-icon" viewBox="0 0 24 24">
                        <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
                    </svg>
                    <p>Drop PDF file here</p>
                    <p class="support-text">or click to browse files</p>
                    <input type="file" id="file-input" accept=".pdf">
                </div>
                <div id="file-info"></div>
            </div>
            
            <div class="options">
                <label for="format">Output Format:</label>
                <select id="format">
                    <option value="docx">DOCX (Modern Word)</option>
                    <option value="doc">DOC (Legacy Word)</option>
                </select>
                <button id="convert-btn" disabled>Convert to Word</button>
            </div>
            
            <div id="progress-section" class="hidden">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p id="progress-text">Preparing conversion...</p>
            </div>
            
            <div id="result-section" class="hidden">
                <svg class="success-icon" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                <h3>Conversion Complete!</h3>
                <a id="download-btn" class="download-btn">Download Word File</a>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>

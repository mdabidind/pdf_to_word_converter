<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFToolsLover - PDF to Word Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .file-input {
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #3498db;
            text-align: center;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            width: 100%;
            cursor: pointer;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #status {
            margin: 10px 0;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h1>PDFToolsLover</h1>
    <h2>PDF to Word Converter</h2>
    
    <div class="file-input">
        <input type="file" id="pdfFile" accept=".pdf">
        <p>Max file size: 10MB</p>
    </div>
    
    <button id="convertBtn" disabled>Convert to Word</button>
    <div id="status"></div>
    <div id="downloadLink" style="display:none;">
        <a id="docxDownload" download>Download Word File</a>
    </div>

    <script>
        // Simple file input handler
        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const convertBtn = document.getElementById('convertBtn');
            if (e.target.files.length > 0) {
                convertBtn.disabled = false;
                document.getElementById('status').textContent = 'File selected: ' + e.target.files[0].name;
            } else {
                convertBtn.disabled = true;
            }
        });

        // Simple conversion handler
        document.getElementById('convertBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('pdfFile');
            if (!fileInput.files || fileInput.files.length === 0) {
                document.getElementById('status').textContent = 'Please select a file first';
                return;
            }
            
            document.getElementById('status').textContent = 'Conversion started...';
            
            // Simulate conversion (replace with actual conversion logic)
            setTimeout(function() {
                document.getElementById('status').textContent = 'Conversion complete!';
                document.getElementById('downloadLink').style.display = 'block';
            }, 2000);
        });
    </script>
</body>
</html>

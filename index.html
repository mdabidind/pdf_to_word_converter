<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Powered PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <h1>PDF to Word Converter</h1>
        <div class="converter">
            <div id="drop-area">
                <p>Drag & drop PDF file here</p>
                <input type="file" id="fileElem" accept=".pdf">
                <label class="button" for="fileElem">Select PDF</label>
            </div>
            <div class="options">
                <select id="format">
                    <option value="docx">DOCX</option>
                    <option value="doc">DOC</option>
                </select>
                <button id="convert-btn">Convert</button>
            </div>
            <div id="progress" class="hidden">
                <div class="progress-bar"></div>
                <p>Processing via GitHub...</p>
            </div>
            <div id="result" class="hidden">
                <a id="download-link" class="button">Download Word File</a>
                <div id="qr-code"></div>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>

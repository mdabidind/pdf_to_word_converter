<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFToolsLover - PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDFToolsLover</h1>
            <h2>PDF to Word Converter</h2>
        </div>

        <div class="converter-box">
            <label for="pdfFile" class="file-label" id="fileDropArea">
                <span id="fileName">Choose PDF file</span>
                <span class="file-size">Max 10MB</span>
                <input type="file" id="pdfFile" accept=".pdf">
            </label>

            <button id="convertBtn" disabled>
                <span id="btnText">Convert to Word</span>
                <span id="btnIcon">→</span>
                <div id="progressBar" class="progress-bar"></div>
            </button>

            <div id="status"></div>

            <div id="downloadLink" style="display:none;">
                <a id="docxDownload" download class="download-btn">
                    <span>Download Word File</span>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>All conversions happen in your browser - your files never leave your device</p>
        </div>
    </div>

    <!-- Load PDF.js with worker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
    
    <!-- Load docx.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.min.js"></script>
    
    <!-- Main script -->
    <script src="assets/script.js"></script>
</body>
</html>

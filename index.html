<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Word Converter</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <h1>PDF to Word</h1>
            <p class="subtitle">Convert your PDF documents to editable Word files</p>
            
            <div id="upload-section">
                <div id="drop-zone">
                    <svg class="upload-icon" viewBox="0 0 24 24">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <p>Drop PDF file here</p>
                    <p class="support-text">or click to browse files</p>
                    <input type="file" id="file-input" accept=".pdf">
                </div>
                <div id="file-info"></div>
            </div>
            
            <div class="options">
                <label for="format">Output Format:</label>
                <select id="format">
                    <option value="docx">DOCX (Modern Word)</option>
                    <option value="doc">DOC (Legacy Word)</option>
                </select>
                <button id="convert-btn" disabled>Convert to Word</button>
            </div>
            
            <div id="progress-section" class="hidden">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p id="progress-text">Preparing conversion...</p>
            </div>
            
            <div id="result-section" class="hidden">
                <h3>Conversion Complete!</h3>
                <a id="download-btn" class="download-btn" download>Download Word File</a>
            </div>
            
            <div id="error-section" class="hidden">
                <h3>Conversion Failed</h3>
                <button id="retry-btn">Try Again</button>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>
